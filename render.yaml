services:
  - type: web
    name: aria-trading-agent
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      corepack enable pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/web run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /api
      - key: DATABASE_URL
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: BITGET_API_KEY
        sync: false
    staticPublishPath: artifacts/web/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: /api/*
      - type: rewrite
        source: /*
        destination: /index.html
