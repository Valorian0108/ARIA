services:
  - type: web
    name: aria-trading-agent
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      corepack enable pnpm &&
      pnpm install --frozen-lockfile &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/web run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: BITGET_API_KEY
        sync: false

